# straitjacket-allow-file[:duplication] — fleet-synced from captain/.fleet/vale, with a local [notes/**] override below
StylesPath = styles
MinAlertLevel = suggestion

Vocab = Powderworks
Packages = proselint

[*.md]
BasedOnStyles = Vale, proselint
# Spelling is codespell's job (see .fleet/codespell) — Vale's dictionary
# spell-check false-positives on every unknown jargon word. Keep Vale.Terms,
# which powers the Powderworks vocabulary's terminology enforcement.
Vale.Spelling = NO

# notes/ is working design scratch — coined operator names and jargon there
# trip proselint; skip it (codespell skips ./notes too).
[notes/**]
BasedOnStyles =
