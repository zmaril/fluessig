fleet = "zmaril/powderworks"

[checks]
# No dedicated website yet — the repo is the product.
website = "off"
# Adopted on enrollment; the fleet default is "recommended".
conventional-commits = "required"

[allow-auto-merge]
# Auto-merge is enabled on the repo so a green PR can land without a babysitter.
# The check asserts GitHub's allow_auto_merge matches this declaration.
enabled = true

[lockfiles]
# These packages deliberately gitignore package-lock.json (see .gitignore and
# spike/.gitignore, both since the initial commit) — the rust engine is the
# product and these js packages are build/spike tooling, so their lockfiles
# aren't tracked. Exempt them rather than reverse that decision.
ignore = ["emitter", "spike", "typespec"]
