fleet = "zmaril/powderworks"

[checks]
# No dedicated website yet — the repo is the product.
website = "off"
# Adopted on enrollment; the fleet default is "recommended".
conventional-commits = "required"

[scripts]
# Deliberate keepers that live beside the code they serve, not in scripts/:
#   - the publish crate's dry-run verifier sits by its tests so `cargo test`
#     and the README reference it in place;
#   - the cpp-demo crate's regen.sh / run.sh regenerate and exercise the
#     committed C/C++ bindgen artifacts in the crate they belong to;
#   - the java-demo crate's run.sh builds & runs the committed JNI round-trip;
#   - the callback-demo-node / -py crates' regen.sh / run.sh regenerate and
#     exercise the committed napi / pyo3 callback round-trips in place;
#   - the callback-demo-ruby crate's regen.sh / run.sh regenerate and exercise
#     the committed magnus callback round-trip in place.
allow = [
    "crates/fluessig-publish/tests/verify_dry_run.sh",
    "crates/cpp-demo/regen.sh",
    "crates/cpp-demo/run.sh",
    "crates/java-demo/run.sh",
    "crates/callback-demo-node/regen.sh",
    "crates/callback-demo-node/run.sh",
    "crates/callback-demo-py/regen.sh",
    "crates/callback-demo-py/run.sh",
    "crates/callback-demo-ruby/regen.sh",
    "crates/callback-demo-ruby/run.sh",
]

[stray-todos]
# Deliberate, issue-tracked markers: the cpp bindgen backend emits a
# `TODO(#69)` note on infallible ops, and that note is baked into the
# committed cpp-demo generated output. Both are tracked by issue #69.
ignore = [
    "src/bindgen/cpp.rs",
    "crates/cpp-demo/src/generated.rs",
]
