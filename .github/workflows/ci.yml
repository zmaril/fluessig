# straitjacket-allow-file:duplication — the per-backend round-trip jobs
# (cpp / java-roundtrip / callback-node / callback-python) deliberately repeat
# the same checkout + rust-toolchain + cache + setup-<lang> + run.sh scaffolding;
# each is an independent, keep-both leg so a rebase alongside sibling backend legs
# never has to merge them. The repetition is intrinsic to GitHub Actions job
# definitions, not extractable duplication.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 2"  # weekly: catch toolchain/dep drift even without a push

jobs:
  # Fan-out: decide whether a PR actually touches anything the rust engine
  # depends on. A docs-only PR skips the compile/clippy/test below — and a
  # skipped required check still reports green, so branch protection stays happy.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      cpp: ${{ steps.filter.outputs.cpp }}
      java: ${{ steps.filter.outputs.java }}
      callback: ${{ steps.filter.outputs.callback }}
      ruby: ${{ steps.filter.outputs.ruby }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'src/**'
              - 'crates/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'catalog.json'
              - 'api.json'
              - 'schema_docs.json'
              - '.github/workflows/ci.yml'
            cpp:
              - 'src/bindgen/cpp.rs'
              - 'src/bindgen/cpp_header.rs'
              - 'src/bindgen/cpp_hpp.rs'
              - 'src/bindgen/mod.rs'
              - 'src/bin/fluessig-gen.rs'
              - 'crates/cpp-demo/**'
              - 'crates/fluessig-runtime/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            # The Java (JNI) round-trip leg runs only when the Java backend, its
            # demo crates, or the harness itself change.
            java:
              - 'src/bindgen/java.rs'
              - 'crates/java-demo/**'
              - 'crates/java-demo-schema/**'
              - 'tests/java_catalog.rs'
              - '.github/workflows/ci.yml'
            # The node + python callback round-trip legs run only when the
            # node/python backends, the shared type-map/gen, the callback demo
            # crates, or the harness itself change.
            callback:
              - 'src/bindgen/node.rs'
              - 'src/bindgen/python.rs'
              - 'src/bindgen/mod.rs'
              - 'src/bin/fluessig-gen.rs'
              - 'crates/callback-demo-node/**'
              - 'crates/callback-demo-py/**'
              - 'crates/fluessig-runtime/**'
              - 'tests/callback_lowering.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            # The Ruby (magnus) callback round-trip leg runs only when the Ruby
            # backend, the shared type-map/gen, the ruby demo crate, or the
            # harness itself change.
            ruby:
              - 'src/bindgen/ruby.rs'
              - 'src/bindgen/ruby_callback.rs'
              - 'src/bindgen/mod.rs'
              - 'src/bin/fluessig-gen.rs'
              - 'crates/callback-demo-ruby/**'
              - 'crates/fluessig-runtime/**'
              - 'tests/ruby_callback_lowering.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'

  rust:
    name: rust engine + fixture tests
    needs: changes
    # Always run on push/schedule; on PRs, only when rust-relevant files changed.
    if: needs.changes.outputs.rust == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # The compile+run gate for the C/C++ bindgen backend: build the cpp-demo
  # cdylib, then compile & run the C and C++ consumers against the committed
  # headers under BOTH gcc/g++ and clang/clang++. This is the only check that
  # actually compiles the generated `extern "C"` layer AND exercises it end to
  # end (a real put/get/keys/error round-trip through the C ABI).
  cpp:
    name: C/C++ consumer round-trip
    needs: changes
    # Always run on push/schedule; on PRs, only when cpp-relevant files changed.
    if: needs.changes.outputs.cpp == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - { cc: gcc, cxx: g++ }
          - { cc: clang, cxx: clang++ }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install C/C++ compilers
        run: sudo apt-get update && sudo apt-get install -y build-essential clang
      - name: C/C++ consumer round-trip (${{ matrix.toolchain.cc }} / ${{ matrix.toolchain.cxx }})
        env:
          CC: ${{ matrix.toolchain.cc }}
          CXX: ${{ matrix.toolchain.cxx }}
        run: crates/cpp-demo/run.sh

  # ── Java (JNI) backend round-trip ────────────────────────────────────────────
  # Additive, independent leg: builds the fluessig-generated JNI glue into a real
  # cdylib, compiles the generated `.java` with javac, and runs it under the JVM,
  # asserting the sync / infallible / async / stream output. NOT in the branch
  # ruleset's required-checks list, so it does not block merges — a maintainer can
  # promote it there later if they want it gating. Kept in its own job block so a
  # rebase alongside sibling wasm / C++ CI legs can keep-both.
  java-roundtrip:
    name: java JNI round-trip
    needs: changes
    if: needs.changes.outputs.java == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The runners lack a JDK; the container that authored this leg ships javac
      # 21, but CI needs it provisioned explicitly.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - run: bash crates/java-demo/run.sh

  # ── node (napi) callback round-trip ──────────────────────────────────────────
  # Additive, independent leg: builds the fluessig-generated napi surface into a
  # real .node addon and drives it from a JS consumer, asserting a host closure is
  # invoked from Rust with [0, 1, 2] via a napi ThreadsafeFunction. NOT in the
  # branch ruleset's required-checks list, so it does not block merges (like
  # java-roundtrip). Its own job block so a rebase alongside sibling legs keeps both.
  callback-node:
    name: node callback round-trip
    needs: changes
    if: needs.changes.outputs.callback == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: bash crates/callback-demo-node/run.sh

  # ── python (pyo3) callback round-trip ────────────────────────────────────────
  # Additive, independent leg: builds the fluessig-generated pyo3 surface into an
  # importable extension module and drives it from a Python consumer, asserting a
  # host callable is invoked from Rust with [0, 1, 2] inline under the GIL. NOT in
  # the branch ruleset's required-checks list, so it does not block merges (like
  # java-roundtrip).
  callback-python:
    name: python callback round-trip
    needs: changes
    if: needs.changes.outputs.callback == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: bash crates/callback-demo-py/run.sh

  # ── Ruby (magnus) callback + subscription round-trip ─────────────────────────
  # Additive, independent leg: builds the fluessig-generated magnus surface into a
  # real loadable Ruby extension and drives it from a Ruby consumer, asserting a
  # host `Proc` is invoked from Rust under the GVL with [0, 1] and removed on
  # unsubscribe. NOT in the branch ruleset's required-checks list, so it does not
  # block merges (like java-roundtrip). Its own job block so a rebase alongside
  # sibling legs keeps both. rb-sys drives `bindgen`, so libclang must be present.
  callback-ruby:
    name: ruby callback round-trip
    needs: changes
    if: needs.changes.outputs.ruby == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      # rb-sys builds the ruby bindings through `bindgen`, which dlopens libclang.
      - name: install libclang (for rb-sys' bindgen)
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev
      - run: bash crates/callback-demo-ruby/run.sh
