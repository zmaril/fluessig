fleet = "zmaril/powderworks"

[checks]
# No dedicated website yet — the repo is the product.
website = "off"
# Adopted on enrollment; the fleet default is "recommended".
conventional-commits = "required"

[scripts]
# Deliberate keeper: the publish crate's dry-run verifier lives beside the
# crate's tests (not scripts/) so `cargo test` and the README reference it in
# place.
allow = ["crates/fluessig-publish/tests/verify_dry_run.sh"]
