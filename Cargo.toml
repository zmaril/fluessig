[workspace]
members = [
    "crates/fluessig-derive-macros",
    "crates/fluessig-derive",
    "crates/fluessig-runtime",
    "crates/cargo-fluessig",
    "crates/derive-demo",
    "crates/entl-schema-derive",
]

[package]
name = "fluessig"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Describe a typed entity graph once (TypeSpec); project it everywhere — DDL, ORM models, format codecs, language bindings, and an Arrow-fed data plane."
repository = "https://github.com/zmaril/fluessig"

[dependencies]
genco = "0.19.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"

[profile.release]
lto = "thin"
